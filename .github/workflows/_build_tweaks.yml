name: Build Tweaks (Helper)

on:
  workflow_call:
    inputs:
      enable_youpip:
        type: boolean
        required: true
        default: false

      enable_ytuhd:
        type: boolean
        required: true
        default: false

      enable_yq:
        type: boolean
        required: true
        default: false

      enable_ryd:
        type: boolean
        required: true
        default: false

      enable_ytabc:
        type: boolean
        required: true
        default: false

      enable_demc:
        type: boolean
        required: true
        default: false

      tweak_version:
        type: string
        required: false
        default: ""

      tweak_url:
        type: string
        required: false
        default: ""

jobs:
  build-tweaks:
    name: Build Tweaks
    runs-on: macos-latest

    steps:
      - name: Install Dependencies
        run: brew install make ldid dpkg

      - name: Set PATH environment variable
        run: |
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH
          echo "THEOS=${{ github.workspace }}/theos" >> $GITHUB_ENV

      - name: Cache Theos
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        id: theos
        uses: actions/cache@v5
        env:
          cache-name: theos_cache_9bc7340
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Setup Theos
        if: ${{ (inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc) && steps.theos.outputs.cache-hit != 'true' }}
        uses: actions/checkout@v6
        with:
          repository: theos/theos
          ref: 9bc73406cf80b711ef4d02c15ff1dedc4478a275
          path: theos
          submodules: recursive

      - name: Download iOS SDK
        if: ${{ (inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc) && steps.theos.outputs.cache-hit != 'true' }}
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks

      - name: Download YouTube Plus (by version)
        if: ${{ inputs.tweak_version != '' }}
        run: |
          deb_url="https://github.com/dayanch96/YTLite/releases/download/v${{ inputs.tweak_version }}/com.dvntm.ytlite_${{ inputs.tweak_version }}_iphoneos-arm.deb"
          wget "$deb_url" --no-verbose -O ytplus.deb

      - name: Download YouTube Plus (by URL)
        if: ${{ inputs.tweak_url != '' }}
        run: |
          wget "${{ inputs.tweak_url }}" --no-verbose -O ytplus.deb
          file_type=$(file --mime-type -b ytplus.deb)
          if [[ "$file_type" != "application/vnd.debian.binary-package" ]]; then
            echo "::error::Validation failed: The file is not a valid DEB file. Detected type: $file_type."
            exit 1
          fi

      - name: Patch YTLite dylib (bypass Patreon gate)
        if: ${{ inputs.tweak_version != '' || inputs.tweak_url != '' }}
        run: |
          set -euo pipefail

          # --- SHA256 verification of upstream .deb ---
          EXPECTED_SHA256="cc48b87d76605b26e75414e2bc3d678b5f32f3c7bc57710754f29dc33b2fff9b"
          ACTUAL_SHA256=$(shasum -a 256 ytplus.deb | cut -d' ' -f1)
          echo "Downloaded .deb SHA256: $ACTUAL_SHA256"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::SHA256 mismatch! Expected: $EXPECTED_SHA256, Got: $ACTUAL_SHA256"
            exit 1
          fi
          echo "SHA256 verified OK"

          # --- Extract .deb ---
          PATCH_DIR=$(mktemp -d)
          dpkg-deb -R ytplus.deb "$PATCH_DIR"
          DYLIB="$PATCH_DIR/Library/MobileSubstrate/DynamicLibraries/YTLite.dylib"

          if [ ! -f "$DYLIB" ]; then
            echo "::error::YTLite.dylib not found in extracted .deb"
            exit 1
          fi

          # --- Force ptnRegisterBlock internal gates to "authorized" ---
          # ptnRegisterBlock at 0x1e878 gates all 355 hook registrations.
          # Keep the function intact (it does retain/release/dispatch) but force
          # its 3 internal gate checks to always take the "authorized" path.

          # Gate 1: cset w8,eq at 0x1e8c8 → MOV W8, #1 (force "auth flag set")
          OFFSET1=$((0x1e8c8))
          echo "=== BEFORE patch (4 bytes at 0x1e8c8 - gate 1: auth check) ==="
          xxd -s $OFFSET1 -l 4 "$DYLIB"
          printf '\x28\x00\x80\x52' | dd of="$DYLIB" bs=1 seek=$OFFSET1 conv=notrunc 2>/dev/null
          echo "=== AFTER patch ==="
          xxd -s $OFFSET1 -l 4 "$DYLIB"
          ACTUAL1=$(xxd -s $OFFSET1 -l 4 -p "$DYLIB")
          if [ "$ACTUAL1" != "28008052" ]; then echo "::error::Gate 1 FAILED!"; exit 1; fi
          echo "Gate 1 OK: auth check forced to 1"

          # Gate 2: ldrb w8,[x8,#0x4e0] at 0x1e954 → MOV W8, #0
          # After XOR with 1 this becomes 1 (the "registered" path)
          OFFSET2=$((0x1e954))
          echo "=== BEFORE patch (4 bytes at 0x1e954 - gate 2: registration check) ==="
          xxd -s $OFFSET2 -l 4 "$DYLIB"
          printf '\x08\x00\x80\x52' | dd of="$DYLIB" bs=1 seek=$OFFSET2 conv=notrunc 2>/dev/null
          echo "=== AFTER patch ==="
          xxd -s $OFFSET2 -l 4 "$DYLIB"
          ACTUAL2=$(xxd -s $OFFSET2 -l 4 -p "$DYLIB")
          if [ "$ACTUAL2" != "08008052" ]; then echo "::error::Gate 2 FAILED!"; exit 1; fi
          echo "Gate 2 OK: registration check forced to 0 (XOR 1 → 1 = registered)"

          # Gate 3: cset w8,eq at 0x1e998 → MOV W8, #1 (force "auth flag set")
          OFFSET3=$((0x1e998))
          echo "=== BEFORE patch (4 bytes at 0x1e998 - gate 3: second auth check) ==="
          xxd -s $OFFSET3 -l 4 "$DYLIB"
          printf '\x28\x00\x80\x52' | dd of="$DYLIB" bs=1 seek=$OFFSET3 conv=notrunc 2>/dev/null
          echo "=== AFTER patch ==="
          xxd -s $OFFSET3 -l 4 "$DYLIB"
          ACTUAL3=$(xxd -s $OFFSET3 -l 4 -p "$DYLIB")
          if [ "$ACTUAL3" != "28008052" ]; then echo "::error::Gate 3 FAILED!"; exit 1; fi
          echo "Gate 3 OK: second auth check forced to 1"

          # --- Patch dvnLocked to always return 0 (unlocked) ---
          OFFSET4=$((0x1eb64))
          echo "=== BEFORE patch (8 bytes at 0x1eb64 - dvnLocked) ==="
          xxd -s $OFFSET4 -l 8 "$DYLIB"
          printf '\x00\x00\x80\x52\xc0\x03\x5f\xd6' | dd of="$DYLIB" bs=1 seek=$OFFSET4 conv=notrunc 2>/dev/null
          echo "=== AFTER patch ==="
          xxd -s $OFFSET4 -l 8 "$DYLIB"
          ACTUAL4=$(xxd -s $OFFSET4 -l 8 -p "$DYLIB")
          if [ "$ACTUAL4" != "00008052c0035fd6" ]; then echo "::error::dvnLocked FAILED!"; exit 1; fi
          echo "dvnLocked OK: returns 0 (unlocked)"

          # --- Patch dvnCheck cset to always return 1 (authenticated) ---
          OFFSET5=$((0x1eb94))
          echo "=== BEFORE patch (4 bytes at 0x1eb94 - dvnCheck cset) ==="
          xxd -s $OFFSET5 -l 4 "$DYLIB"
          printf '\x33\x00\x80\x52' | dd of="$DYLIB" bs=1 seek=$OFFSET5 conv=notrunc 2>/dev/null
          echo "=== AFTER patch ==="
          xxd -s $OFFSET5 -l 4 "$DYLIB"
          ACTUAL5=$(xxd -s $OFFSET5 -l 4 -p "$DYLIB")
          if [ "$ACTUAL5" != "33008052" ]; then echo "::error::dvnCheck FAILED!"; exit 1; fi
          echo "dvnCheck OK: always returns 1"

          # --- NOP runtime lock (strb wzr,[x8,#0x4e1] at 0x26ff8) ---
          OFFSET6=$((0x26ff8))
          echo "=== BEFORE patch (4 bytes at 0x26ff8 - runtime lock) ==="
          xxd -s $OFFSET6 -l 4 "$DYLIB"
          printf '\x1f\x20\x03\xd5' | dd of="$DYLIB" bs=1 seek=$OFFSET6 conv=notrunc 2>/dev/null
          echo "=== AFTER patch ==="
          xxd -s $OFFSET6 -l 4 "$DYLIB"
          ACTUAL6=$(xxd -s $OFFSET6 -l 4 -p "$DYLIB")
          if [ "$ACTUAL6" != "1f2003d5" ]; then echo "::error::NOP FAILED!"; exit 1; fi
          echo "NOP OK: runtime lock instruction disabled"

          # --- Redirect lock path to unlock path (0x26ff4 → B 0x274b0) ---
          OFFSET7=$((0x26ff4))
          echo "=== BEFORE patch (4 bytes at 0x26ff4 - lock path) ==="
          xxd -s $OFFSET7 -l 4 "$DYLIB"
          printf '\x2f\x01\x00\x14' | dd of="$DYLIB" bs=1 seek=$OFFSET7 conv=notrunc 2>/dev/null
          echo "=== AFTER patch ==="
          xxd -s $OFFSET7 -l 4 "$DYLIB"
          ACTUAL7=$(xxd -s $OFFSET7 -l 4 -p "$DYLIB")
          if [ "$ACTUAL7" != "2f010014" ]; then echo "::error::Lock redirect FAILED!"; exit 1; fi
          echo "Lock redirect OK: lock path → unlock path"

          # --- Repackage .deb ---
          dpkg-deb -b "$PATCH_DIR" ytplus.deb
          rm -rf "$PATCH_DIR"
          echo "Repackaged ytplus.deb with patched dylib"

      - name: Clone YouTubeHeader
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        run: |
          if [ -d "$THEOS/include/YouTubeHeader" ]; then
            cd $THEOS/include/YouTubeHeader && git pull
          else
            cd $THEOS/include && git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          fi
          if [ "${{ inputs.enable_demc }}" = "true" ]; then
            rm -rf "$THEOS/include/YTHeaders"
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi

      - name: Clone PSHeader
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_ytabc || inputs.enable_demc }}
        run: |
          if [ -d "$THEOS/include/PSHeader" ]; then
            cd $THEOS/include/PSHeader && git pull
          else
            cd $THEOS/include && git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git
          fi

      - name: Clone YouPiP
        if: ${{ inputs.enable_youpip }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git

      - name: Clone YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: git clone --quiet --depth=1 https://github.com/Tonwalter888/YTUHD.git

      - name: Clone Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YTABConfig
        if: ${{ inputs.enable_ytabc }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTABConfig.git

      - name: Clone YouGroupSettings
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git

      - name: Clone YouQuality
        if: ${{ inputs.enable_yq }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip || inputs.enable_ytuhd }}
        run: git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: git clone --quiet --depth=1 https://github.com/therealFoxster/DontEatMyContent.git

      - name: Build YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          cd YouPiP && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../youpip.deb

      - name: Build YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: |
          cd YTUHD && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ytuhd.deb

      - name: Build Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          cd Return-YouTube-Dislikes && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ryd.deb

      - name: Build YTABConfig
        if: ${{ inputs.enable_ytabc }}
        run: |
          cd YTABConfig && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ytabc.deb

      - name: Build YouGroupSettings
        if: ${{ inputs.enable_youpip || inputs.enable_ytuhd || inputs.enable_yq || inputs.enable_ryd || inputs.enable_demc }}
        run: |
          cd YouGroupSettings && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ygs.deb

      - name: Build YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          cd YouQuality && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../yq.deb

      - name: Build YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip || inputs.enable_ytuhd }}
        run: |
          cd YTVideoOverlay && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../ytvo.deb

      - name: Build DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          cd DontEatMyContent && make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ../demc.deb

      - name: Clone Open in YouTube (Safari extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/BillyCurtis/OpenYouTubeSafariExtension
          cd OpenYoutubeSafariExtension
          git sparse-checkout set --no-cone OpenYoutubeSafariExtension.appex
          git checkout
          mv *.appex ..

      - name: Upload built debs as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: built-debs
          path: |
            *.deb
            *.appex
          if-no-files-found: ignore
          retention-days: 1